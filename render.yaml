services:
  - type: web
    name: clonecraft-ai
    runtime: node
    plan: free
    buildCommand: npm ci --omit=optional && NODE_OPTIONS="--max-old-space-size=512" npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: KIE_API_KEY
        sync: false
      - key: KIE_API_BASE_URL
        value: https://api.kie.ai
      - key: APIFY_API_TOKEN
        sync: false
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
